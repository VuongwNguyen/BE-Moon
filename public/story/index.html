<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumora Story</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#060610; color:#fff;
      font-family:'Georgia',serif;
      overflow:hidden; height:100vh; height:100dvh; width:100vw;
      user-select:none; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;
    }

    /* ── Intro ── */
    #se-intro {
      position:fixed; inset:0; z-index:50;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      cursor:pointer; transition:opacity 0.9s ease;
      background:
        radial-gradient(ellipse 80% 55% at 50% 10%, rgba(109,40,217,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(30,60,160,0.12) 0%, transparent 60%),
        #060610;
    }
    #se-intro.hidden { opacity:0; pointer-events:none; }
    #se-intro-title {
      font-size:clamp(26px,5vw,50px);
      font-weight:300; letter-spacing:0.1em;
      color:#f0ece4; text-align:center; margin-bottom:8px;
    }
    #se-intro-occasion {
      font-size:11px; color:rgba(255,255,255,0.3);
      letter-spacing:0.22em; text-transform:uppercase; margin-bottom:56px;
      font-family:sans-serif;
    }
    .se-stars {
      position:absolute; inset:0; overflow:hidden; pointer-events:none;
    }
    .se-star {
      position:absolute; border-radius:50%; background:#fff;
    }
    .se-pulse {
      width:52px; height:52px; border-radius:50%;
      border:1px solid rgba(255,255,255,0.28);
      animation:sePulse 2s ease-out infinite;
    }
    @keyframes sePulse {
      0%   { transform:scale(0.8); opacity:1; }
      100% { transform:scale(2.2); opacity:0; }
    }
    .se-tap-hint {
      margin-top:18px; font-family:sans-serif;
      font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:0.16em;
    }

    /* ── Progress bar ── */
    #se-progress-bar {
      position:fixed; top:0; left:0; right:0; height:2px;
      background:rgba(255,255,255,0.07); z-index:45; pointer-events:none;
    }
    #se-progress-fill {
      height:100%; width:0%;
      background:linear-gradient(to right, rgba(196,181,253,0.7), rgba(139,92,246,0.4));
      transition:width 0.5s ease;
    }

    /* ── Photo ── */
    #se-photo {
      position:fixed; inset:0; z-index:20;
      background:#060610;
      opacity:0; pointer-events:none;
      transition:opacity 0.55s ease; cursor:pointer;
      overflow:hidden;
    }
    #se-photo.visible { opacity:1; pointer-events:all; }
    #se-photo-bg {
      position:absolute; inset:-30px;
      background-size:cover; background-position:center;
      filter:blur(24px) brightness(0.35);
      transform:scale(1.08);
    }
    #se-photo-img {
      position:absolute; inset:0;
      width:100%; height:100%; object-fit:contain;
    }

    /* ── Gradient overlay bottom ── */
    #se-photo-gradient {
      position:absolute; bottom:0; left:0; right:0; height:58%;
      background:linear-gradient(to top, rgba(4,4,14,0.94) 0%, rgba(4,4,14,0.55) 45%, transparent 100%);
      pointer-events:none;
    }

    /* ── Hook overlay (inside photo) ── */
    #se-hook-overlay {
      position:absolute; bottom:0; left:0; right:0;
      padding:0 22px 28px;
      pointer-events:none;
      opacity:0; transition:opacity 0.55s ease;
    }
    #se-hook-overlay.visible { opacity:1; }
    #se-chapter-tag {
      font-family:sans-serif; font-size:clamp(11px,1.6vh,15px); letter-spacing:0.18em;
      text-transform:uppercase; color:rgba(255,255,255,0.45);
      margin-bottom:10px;
    }
    #se-hook-text {
      font-size:clamp(22px,4vh,52px);
      font-weight:300; line-height:1.65;
      color:rgba(255,255,255,0.92);
      letter-spacing:0.02em; font-style:italic;
    }

    /* ── Photo dots (per-photo inside chapter) ── */
    #se-photo-dots {
      position:fixed; bottom:12px; right:18px; z-index:40;
      display:flex; gap:4px; align-items:center; pointer-events:none;
    }
    .se-dot {
      width:4px; height:4px; border-radius:50%;
      background:rgba(255,255,255,0.22); transition:all 0.25s;
    }
    .se-dot.active { width:12px; border-radius:2px; background:rgba(255,255,255,0.72); }

    /* ── Finale ── */
    #se-finale {
      position:fixed; inset:0; z-index:60;
      display:flex; align-items:center; justify-content:center;
      background:#060610; opacity:0; pointer-events:none;
      transition:opacity 1s ease;
    }
    #se-finale.visible { opacity:1; }
    #se-finale-text {
      font-size:clamp(15px,2.5vw,26px);
      font-weight:300; color:rgba(240,236,228,0.65);
      letter-spacing:0.05em; text-align:center; padding:0 32px;
    }

    /* ── Audio button ── */
    #btn-audio {
      position:fixed; top:18px; right:18px; z-index:100;
      width:36px; height:36px; border-radius:50%;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.13);
      color:#fff; font-size:14px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    #btn-audio.hidden { display:none; }
  </style>
</head>
<body>

  <div id="se-intro">
    <div class="se-stars" id="se-stars"></div>
    <div id="se-intro-title">Lumora</div>
    <div id="se-intro-occasion"></div>
    <div class="se-pulse"></div>
    <div class="se-tap-hint">Chạm để bắt đầu</div>
  </div>

  <div id="se-progress-bar"><div id="se-progress-fill"></div></div>

  <div id="se-photo">
    <div id="se-photo-bg"></div>
    <img id="se-photo-img" src="" alt="" />
    <canvas id="se-effect-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
    <div id="se-photo-gradient"></div>
    <div id="se-hook-overlay">
      <div id="se-chapter-tag"></div>
      <div id="se-hook-text"></div>
    </div>
  </div>

  <div id="se-photo-dots"></div>

  <div id="se-finale"><div id="se-finale-text">Và đây là tất cả ký ức của chúng ta...</div></div>

  <button id="btn-audio" class="hidden">🔇</button>

  <script>
    (function() {
      const c = document.getElementById('se-stars');
      if (!c) return;
      for (let i = 0; i < 40; i++) {
        const s = document.createElement('div');
        s.className = 'se-star';
        const size = Math.random() < 0.3 ? 2 : 1;
        s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${(Math.random()*0.5+0.2).toFixed(2)}`;
        c.appendChild(s);
      }
    })();

    window.musicManager = {
      audio:null, isPlaying:false, _initialized:false,
      init(url){
        if(this._initialized)return; this._initialized=true;
        const btn=document.getElementById('btn-audio');
        if(!url){btn&&btn.classList.add('hidden');return;}
        this.audio=new Audio(url);
        this.audio.loop=true; this.audio.volume=0.7;
        this.audio.onplay =()=>{this.isPlaying=true; if(btn)btn.textContent='🔊';};
        this.audio.onpause=()=>{this.isPlaying=false;if(btn)btn.textContent='🔇';};
        this.audio.play().catch(()=>{});
        if(btn){btn.classList.remove('hidden');btn.addEventListener('click',()=>this.toggle());}
      },
      play(){return this.audio?.play()??Promise.reject();},
      toggle(){this.audio?.paused?this.play().catch(()=>{}):this.audio?.pause();}
    };
  </script>

  <script type="module" src="./js/story.js"></script>
</body>
</html>

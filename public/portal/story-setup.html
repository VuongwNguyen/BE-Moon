<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <title>Lumora — Story Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #8b5cf6;
      --accent-light: #c4b5fd;
      --accent-dim: rgba(139,92,246,0.1);
      --accent-border: rgba(139,92,246,0.28);
      --text: #ede9f8;
      --text-sub: rgba(237,233,248,0.42);
      --border: rgba(255,255,255,0.06);
      --glass: rgba(4,4,12,0.95);
      --panel-w: 380px;
      --r: 14px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Jost', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex; background: #060610;
    }

    /* ── SE Preview pane ── */
    #preview-pane {
      flex: 1; position: relative; overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse 80% 55% at 50% 10%, rgba(109,40,217,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(30,60,160,0.1) 0%, transparent 60%),
        #060610;
    }

    /* Photo background layer */
    #preview-photos {
      position: absolute; inset: 0; z-index: 1;
    }
    .preview-photo-bg {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1s ease;
    }
    .preview-photo-bg .ph-blur {
      position: absolute; inset: -30px;
      background-size: cover; background-position: center;
      filter: blur(24px) brightness(0.35);
      transform: scale(1.08);
    }
    .preview-photo-bg img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* Bottom text overlay — mirrors SE viewer */
    #se-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 80px 36px 36px;
      background: linear-gradient(to top, rgba(4,4,12,0.95) 0%, rgba(4,4,12,0.6) 50%, transparent 100%);
      pointer-events: none;
    }
    #se-bottom-label {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); font-family: 'Jost', sans-serif;
      margin-bottom: 12px;
    }
    #se-bottom-hook {
      font-family: 'Georgia', serif; font-style: italic;
      font-size: clamp(17px, 2.2vw, 26px);
      color: #fff; line-height: 1.55;
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
    }

    /* Canvas effect layer — subtle on top of photo */
    #se-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
      opacity: 0.4;
    }

    /* CSS stars */
    .se-star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: var(--min, 0.05); }
      50%      { opacity: var(--max, 0.4); }
    }

    /* Center preview text */
    #se-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    /* Hide center overlay when photo is shown */
    #preview-pane.has-photo #se-center { opacity: 0; }
    #preview-pane.has-photo #se-bottom { opacity: 1; }
    #preview-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); font-family: 'Jost', sans-serif;
      margin-bottom: 20px;
    }
    #preview-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4.5vw, 58px);
      font-weight: 400; letter-spacing: 0.08em;
      color: rgba(240,236,228,0.88); line-height: 1.1;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(139,92,246,0.3);
    }
    #preview-occasion {
      font-size: 11px; color: rgba(255,255,255,0.28);
      letter-spacing: 0.2em; text-transform: uppercase;
      font-family: 'Jost', sans-serif; margin-bottom: 40px;
    }
    .se-pulse-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .se-pulse {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      animation: sePulse 2.2s ease-out infinite;
    }
    @keyframes sePulse {
      0%   { transform: scale(0.85); opacity: 0.9; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* Toggle */
    #panel-toggle {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      width: 20px; height: 52px;
      background: rgba(4,4,12,0.92);
      border: 1px solid var(--accent-border); border-right: none;
      border-radius: 8px 0 0 8px;
      cursor: pointer; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-light); font-size: 10px;
      transition: background 0.2s;
    }
    #panel-toggle:hover { background: rgba(139,92,246,0.2); }

    /* ── Story panel ── */
    #story-panel {
      width: var(--panel-w); height: 100vh; flex-shrink: 0;
      background: var(--glass);
      border-left: 1px solid var(--accent-border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.3s ease, border-color 0.3s ease;
    }
    #story-panel.collapsed { width: 0; border-color: transparent; }

    /* Panel header */
    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn {
      font-size: 12px; color: var(--text-sub); text-decoration: none;
      letter-spacing: 0.05em; transition: color 0.2s;
      display: inline-block; margin-bottom: 10px;
    }
    .back-btn:hover { color: var(--text); }
    .header-eyebrow {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent-light); opacity: 0.7; margin-bottom: 4px;
    }
    #galaxy-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Chat */
    .chat-wrap {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 32px;
      display: flex; flex-direction: column;
    }
    .chat-wrap::-webkit-scrollbar { width: 3px; }
    .chat-wrap::-webkit-scrollbar-thumb { background: var(--accent-border); border-radius: 2px; }

    /* ── Chat elements ── */
    .lmsg { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
    .av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #6d28d9, #4c1d95);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: rgba(255,255,255,0.85);
      box-shadow: 0 0 14px rgba(109,40,217,0.4); margin-top: 2px;
    }
    .lbubble {
      background: var(--accent-dim);
      border: 1px solid rgba(139,92,246,0.18);
      border-radius: 3px 14px 14px 14px;
      padding: 11px 15px; font-size: 13px; line-height: 1.75;
      color: rgba(237,233,248,0.82); max-width: 90%;
    }
    .lbubble em { color: var(--accent-light); font-style: italic; }
    .err-bubble { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); color: #fca5a5; }

    .typing-dots {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
      background: rgba(139,92,246,0.07);
      border: 1px solid rgba(139,92,246,0.12);
      border-radius: 3px 14px 14px 14px;
    }
    .typing-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(139,92,246,0.55);
      animation: tdot 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .umsg { display: flex; margin-bottom: 14px; justify-content: flex-end; }
    .ububble {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px 3px 14px 14px;
      padding: 10px 15px; font-size: 13px;
      color: rgba(255,255,255,0.6); max-width: 80%;
    }

    .chips-wrap { margin: 2px 0 14px 38px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 8px 16px; border-radius: 24px;
      background: rgba(139,92,246,0.07);
      border: 1px solid rgba(139,92,246,0.22);
      font-size: 12px; color: rgba(196,181,253,0.7);
      cursor: pointer; transition: all 0.18s;
    }
    .chip:hover { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.45); color: var(--accent-light); }
    .chip.on { background: rgba(139,92,246,0.22); border-color: rgba(139,92,246,0.55); color: #ddd6fe; }

    .ch-card {
      margin: 4px 0 10px 38px;
      border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(139,92,246,0.15);
      background: rgba(139,92,246,0.05);
      backdrop-filter: blur(4px);
    }
    .ch-head {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .ch-num { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(196,181,253,0.4); margin-bottom: 2px; }
    .ch-title { font-size: 13px; color: rgba(237,233,254,0.85); font-weight: 400; }
    .ch-photos { padding: 10px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .ch-ph {
      width: 48px; height: 48px; border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(139,92,246,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: rgba(255,255,255,0.18);
      cursor: pointer; overflow: hidden; flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .ch-ph:hover { border-color: var(--accent-border); background: rgba(139,92,246,0.08); }
    .ch-ph img { width: 100%; height: 100%; object-fit: cover; }
    .ch-hook-input {
      display: block; width: 100%; box-sizing: border-box;
      padding: 8px 14px 10px;
      font-size: 12px; font-family: 'Georgia', serif; font-style: italic;
      color: rgba(196,181,253,0.75); line-height: 1.6;
      background: transparent; border: none; border-top: 1px solid rgba(139,92,246,0.08);
      resize: none; outline: none; min-height: 52px;
    }
    .ch-hook-input::placeholder { color: rgba(196,181,253,0.25); }
    .ch-hook-input:focus { color: rgba(196,181,253,1); border-top-color: rgba(139,92,246,0.3); }

    .action-row { margin: 4px 0 18px 38px; display: flex; gap: 9px; }
    .btn-next {
      padding: 10px 22px; border-radius: 24px;
      background: rgba(139,92,246,0.15);
      border: 1px solid rgba(139,92,246,0.35);
      font-size: 13px; font-family: 'Jost', sans-serif;
      color: rgba(196,181,253,0.95); cursor: pointer; transition: all 0.18s;
    }
    .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-next:not(:disabled):hover { background: rgba(139,92,246,0.28); }
    .btn-next.done { background: rgba(110,231,183,0.12); border-color: rgba(110,231,183,0.32); color: rgba(110,231,183,0.95); }

    .btn-yesno { margin: 4px 0 16px 38px; display: flex; gap: 9px; }
    .btn-yes {
      padding: 10px 22px; border-radius: 24px;
      background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3);
      font-size: 13px; font-family: 'Jost', sans-serif;
      color: rgba(196,181,253,0.85); cursor: pointer; transition: all 0.18s;
    }
    .btn-yes:hover { background: rgba(139,92,246,0.22); }
    .btn-no {
      padding: 10px 18px; border-radius: 24px;
      background: transparent; border: 1px solid rgba(255,255,255,0.08);
      font-size: 13px; font-family: 'Jost', sans-serif;
      color: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.18s;
    }
    .btn-no:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }

    .done-note { font-size: 11px; color: rgba(255,255,255,0.28); display: block; margin-top: 5px; }

    /* Mobile */
    @media (max-width: 640px) {
      body { flex-direction: column; }
      #preview-pane { height: 35vh; flex: none; }
      #story-panel { width: 100%; height: 65vh; border-left: none; border-top: 1px solid var(--accent-border); }
    }
  </style>
</head>
<body>

  <!-- SE Visual Preview -->
  <div id="preview-pane">
    <div id="preview-photos"></div>
    <canvas id="se-canvas"></canvas>
    <div id="se-bottom">
      <div id="se-bottom-label"></div>
      <div id="se-bottom-hook"></div>
    </div>
    <div id="se-center">
      <div id="preview-label">✦ Story Experience</div>
      <div id="preview-name">—</div>
      <div id="preview-occasion"></div>
      <div class="se-pulse-wrap">
        <div class="se-pulse"></div>
      </div>
    </div>
    <button id="panel-toggle">◀</button>
  </div>

  <!-- Chat Panel -->
  <div id="story-panel">
    <div class="panel-header">
      <a id="back-link" href="/portal/" class="back-btn">← Portal</a>
      <div class="header-eyebrow">✦ Story Experience</div>
      <div id="galaxy-name">Đang tải…</div>
    </div>
    <div class="chat-wrap" id="chat"></div>
  </div>

  <script>
    // ── CSS Stars ──────────────────────────────────────────
    const pane = document.getElementById('preview-pane');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'se-star';
      const sz = Math.random() * 1.8 + 0.3;
      s.style.cssText = `
        width:${sz}px;height:${sz}px;
        left:${Math.random()*100}%;top:${Math.random()*100}%;
        --d:${2+Math.random()*5}s;
        --min:${0.03+Math.random()*0.06};
        --max:${0.25+Math.random()*0.4};
        animation-delay:${Math.random()*5}s;
      `;
      pane.appendChild(s);
    }

    // ── Firefly effect ─────────────────────────────────────
    const canvas = document.getElementById('se-canvas');
    canvas.width  = pane.offsetWidth;
    canvas.height = pane.offsetHeight;
    new ResizeObserver(() => {
      canvas.width  = pane.offsetWidth;
      canvas.height = pane.offsetHeight;
    }).observe(pane);

    (function runFirefly() {
      const ctx = canvas.getContext('2d');
      const N = 18;
      let flies = [];
      function init() {
        const W = canvas.width, H = canvas.height;
        flies = Array.from({ length: N }, () => ({
          x: Math.random() * W, y: Math.random() * H,
          r: Math.random() * 3.5 + 2,
          vx: (Math.random() - 0.5) * 0.28,
          vy: (Math.random() - 0.5) * 0.28,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.012 + 0.006,
          warm: Math.random() < 0.5,
        }));
      }
      init();
      function draw() {
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        const t = Date.now();
        flies.forEach(f => {
          f.x += f.vx + Math.sin(t * 0.0007 + f.phase) * 0.38;
          f.y += f.vy + Math.cos(t * 0.0008 + f.phase) * 0.32;
          if (f.x < -30) f.x = W + 30;
          if (f.x > W+30) f.x = -30;
          if (f.y < -30) f.y = H + 30;
          if (f.y > H+30) f.y = -30;
          const pulse = 0.45 + 0.55 * Math.sin(t * f.speed * 1000 + f.phase);
          const col = f.warm ? '255,210,110' : '190,150,255';
          const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 3.8);
          grad.addColorStop(0,   `rgba(${col},${(pulse * 0.85).toFixed(2)})`);
          grad.addColorStop(0.4, `rgba(${col},${(pulse * 0.28).toFixed(2)})`);
          grad.addColorStop(1,   `rgba(${col},0)`);
          ctx.beginPath();
          ctx.arc(f.x, f.y, f.r * 3.8, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ── Preview text update (called from story-setup.js) ───
    window.updateSEPreview = function(type, occasion, galaxyName) {
      if (galaxyName) document.getElementById('preview-name').textContent = galaxyName;
      if (occasion)   document.getElementById('preview-occasion').textContent = occasion.toUpperCase();
    };

    // ── Photo preview: 1 ảnh duy nhất, cross-fade khi đổi chapter ──

    function showSinglePhoto(url) {
      const pane   = document.getElementById('preview-pane');
      const wrap   = document.getElementById('preview-photos');
      const center = document.getElementById('se-center');

      if (!url) {
        pane.classList.remove('has-photo');
        center.style.removeProperty('opacity'); // let CSS take over
        [...wrap.children].forEach(c => { c.style.opacity = '0'; setTimeout(() => c.remove(), 1000); });
        return;
      }

      const div = document.createElement('div');
      div.style.cssText = 'position:absolute;inset:0;opacity:0;transition:opacity 1s ease;';
      const blur = document.createElement('div');
      blur.style.cssText = 'position:absolute;inset:-30px;background-size:cover;background-position:center;filter:blur(24px) brightness(0.35);transform:scale(1.08);';
      blur.style.backgroundImage = `url(${url})`;
      const img = document.createElement('img');
      img.src = url;
      img.alt = '';
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;';
      div.appendChild(blur);
      div.appendChild(img);
      wrap.appendChild(div);

      pane.classList.add('has-photo');
      center.style.removeProperty('opacity'); // CSS class handles hiding

      requestAnimationFrame(() => requestAnimationFrame(() => {
        div.style.opacity = '0.9';
        [...wrap.children].forEach(c => {
          if (c === div) return;
          c.style.opacity = '0';
          setTimeout(() => c.remove(), 1100);
        });
      }));
    }

    // Slideshow only when chapter has multiple photos
    let _slideTimer = null;
    let _previewGen = 0; // generation counter — cancels stale async calls

    function startChapterPreview(urls) {
      clearInterval(_slideTimer);
      _slideTimer = null;
      if (!urls.length) { showSinglePhoto(null); return; }
      showSinglePhoto(urls[0]);
      if (urls.length > 1) {
        let idx = 0;
        _slideTimer = setInterval(() => {
          idx = (idx + 1) % urls.length;
          showSinglePhoto(urls[idx]);
        }, 3500);
      }
    }

    // From server URLs (sync — always wins over any in-flight async)
    window.setPreviewPhotoUrls = urls => {
      _previewGen++; // invalidate any in-flight setPreviewPhotos call
      startChapterPreview(urls || []);
    };

    // From file select — use FileReader (data: URLs pass CSP; blob: URLs do not)
    window.setPreviewPhotos = async files => {
      const myGen = ++_previewGen;
      const urls = await Promise.all(Array.from(files).map(f => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(f);
      })));
      if (myGen !== _previewGen) return; // stale — a newer chapter took over
      startChapterPreview(urls);
    };

    // ── Panel toggle ───────────────────────────────────────
    document.getElementById('panel-toggle').onclick = function() {
      const panel = document.getElementById('story-panel');
      const collapsed = panel.classList.toggle('collapsed');
      this.textContent = collapsed ? '▶' : '◀';
    };
  </script>
  <script type="module" src="./js/story-setup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Management — Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a1f;
      font-family: sans-serif;
      color: #fff;
      padding: 32px 16px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 8px 16px;
      border-radius: 6px; cursor: pointer; font-size: 13px;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); }
    .galaxy-name { color: #e0b3ff; font-size: 20px; }
    
    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 14px; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
    }
    
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .file-input {
      display: none;
    }
    .upload-btn, .action-btn {
      background: #a259f7;
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 4px;
    }
    .upload-btn:hover, .action-btn:hover { background: #8b47d1; }
    .danger { background: #dc2626; }
    .danger:hover { background: #b91c1c; }
    
    .progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-bar {
      height: 100%;
      background: #a259f7;
      width: 0%;
      transition: width 0.3s;
    }
    .hidden { display: none; }
    
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .image-item {
      position: relative;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }
    .image-item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .delete-image {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(220, 38, 38, 0.9);
      border: none;
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
    }
    .delete-image:hover { background: rgba(185, 28, 28, 0.9); }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/portal/" class="back-btn">← Back to Portal</a>
      <h1 class="galaxy-name" id="galaxyName">Galaxy Management</h1>
    </header>
    
    <div class="section">
      <div class="section-title">Upload Images</div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>Click to select images or drag & drop</p>
        <input type="file" id="fileInput" class="file-input" multiple accept="image/*">
      </div>
      <button class="upload-btn" id="uploadBtn">Upload Selected Images</button>
      <div class="progress hidden" id="uploadProgress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">Actions</div>
      <button class="action-btn" id="copyLinkBtn">Copy Galaxy Link</button>
      <button class="action-btn danger" id="deleteGalaxyBtn">Delete Galaxy</button>
    </div>
    
    <div class="section">
      <div class="section-title">Images</div>
      <div class="image-grid" id="imageGrid">
        <div class="loading">Loading images...</div>
      </div>
    </div>
  </div>
  
  <script src="js/galaxy.js"></script>
</body>
</html>

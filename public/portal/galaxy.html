<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Lumora - ánh sáng của ký ức — Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060e;
      --surface: rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(139,92,246,0.35);
      --text: #ede9fe;
      --text-sub: rgba(255,255,255,0.42);
      --accent: #8b5cf6;
      --accent-dark: #7c3aed;
      --accent-light: #c4b5fd;
      --red: #f87171;
      --green: #6ee7b7;
      --gap: 10px;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 45% at 15% 0%, rgba(109,40,217,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 45% 55% at 85% 105%, rgba(79,25,175,0.14) 0%, transparent 70%),
        radial-gradient(ellipse 30% 30% at 60% 50%, rgba(60,20,140,0.06) 0%, transparent 70%);
      font-family: 'Jost', sans-serif;
      color: var(--text);
      padding: 40px 20px 100px;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover {
      border-color: var(--border-accent);
      color: var(--text);
      background: var(--surface-2);
    }

    .header-title {
      text-align: right;
    }
    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent-light);
      opacity: 0.65;
      margin-bottom: 5px;
    }
    #galaxyName {
      font-family: 'Cinzel', serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    /* ── Cards ──────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 18px;
      transition: border-color 0.25s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.13);
    }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(139,92,246,0.18);
      color: var(--accent-light);
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      padding: 1px 8px;
      letter-spacing: 0.05em;
    }

    /* ── Two-col selects ─────────────────────────── */
    .select-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .select-row > div { margin-bottom: 0 !important; }

    /* ── Upload zone ─────────────────────────────── */
    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 16px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(139,92,246,0.05);
    }
    .upload-icon {
      font-size: 24px;
      opacity: 0.5;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .upload-zone:hover .upload-icon { opacity: 0.8; }
    .upload-text {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 400;
    }
    .upload-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.22);
    }
    .file-input { display: none; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 9px 18px;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139,92,246,0.3);
    }
    .btn-secondary {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-sub);
    }
    .btn-secondary:hover {
      border-color: var(--border-accent);
      color: var(--accent-light);
    }
    .btn-danger {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.22);
      color: var(--red);
    }
    .btn-danger:hover {
      background: rgba(239,68,68,0.18);
      border-color: rgba(239,68,68,0.4);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Progress ────────────────────────────────── */
    .progress-wrap {
      margin-top: 16px;
    }
    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 7px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #c084fc);
      width: 0%;
      border-radius: 99px;
      transition: width 0.2s ease;
    }
    .progress-label {
      font-size: 11px;
      color: var(--text-sub);
      letter-spacing: 0.04em;
    }
    .hidden { display: none; }

    /* ── Caption items ────────────────────────────── */
    .caption-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, opacity 0.15s;
      cursor: grab;
    }
    .caption-item:active { cursor: grabbing; }
    .caption-item.dragging { opacity: 0.35; }
    .caption-item.drag-over {
      border-color: var(--accent);
      background: rgba(139,92,246,0.1);
    }
    .drag-handle {
      color: var(--text-sub);
      font-size: 15px;
      flex-shrink: 0;
      opacity: 0.5;
      user-select: none;
    }
    .caption-text { flex: 1; }
    .caption-item button {
      background: none;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      opacity: 0.6;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .caption-item button:hover { opacity: 1; }

    /* ── Save indicator ───────────────────────────── */
    .save-indicator {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      min-height: 16px;
      transition: color 0.2s;
    }
    .save-indicator.saved { color: var(--green); }
    .save-indicator.error { color: var(--red); }

    /* ── Masonry Grid ─────────────────────────────── */
    .masonry-grid {
      columns: 3 180px;
      column-gap: var(--gap);
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-2);
      cursor: default;
    }
    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease;
    }
    .masonry-item:hover img {
      transform: scale(1.04);
    }
    .masonry-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 8px;
      pointer-events: none;
    }
    .masonry-item:hover .masonry-overlay {
      background: rgba(0,0,0,0.38);
    }
    .delete-image {
      pointer-events: all;
    }
    .delete-image {
      background: rgba(220,38,38,0.88);
      border: none;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.75);
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .masonry-item:hover .delete-image {
      opacity: 1;
      transform: scale(1);
    }
    .delete-image:hover {
      background: #b91c1c !important;
    }

    /* ── Subscription lock ───────────────────────── */
    .feature-lock-msg {
      margin-top: 8px;
      padding: 7px 12px;
      background: rgba(139,92,246,0.08);
      border: 1px solid rgba(139,92,246,0.22);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .feature-lock-msg a {
      color: var(--accent-light);
      text-decoration: none;
      margin-left: auto;
      font-weight: 500;
    }
    .feature-lock-msg a:hover { text-decoration: underline; }
    .section-locked select,
    .section-locked input,
    .section-locked button {
      opacity: 0.38;
      pointer-events: none;
    }

    /* ── Empty / Loading states ───────────────────── */
    .grid-empty {
      text-align: center;
      padding: 52px 24px;
      color: var(--text-sub);
      font-size: 14px;
      letter-spacing: 0.04em;
    }
    .empty-icon {
      font-size: 36px;
      opacity: 0.3;
      margin-bottom: 14px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast notifications ──────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: rgba(12,12,22,0.93);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 13px;
      color: var(--text);
      backdrop-filter: blur(16px);
      pointer-events: all;
      animation: toastIn 0.28s ease forwards;
      max-width: 280px;
    }
    .toast.success { border-color: rgba(110,231,183,0.35); color: var(--green); }
    .toast.error   { border-color: rgba(248,113,113,0.35); color: var(--red); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(6px) scale(0.95); }
    }

    /* ── Lightbox ─────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: lbIn 0.22s ease;
    }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.2); }

    @media (max-width: 600px) {
      body { padding: 20px 14px 80px; }

      header { margin-bottom: 28px; }
      #galaxyName { font-size: 18px; }

      .masonry-grid { columns: 2 140px; }

      .select-row { grid-template-columns: 1fr; }

      .action-row { flex-direction: column; }
      .action-row .btn { width: 100%; justify-content: center; }

      /* always show delete button on touch */
      .delete-image { opacity: 1; transform: scale(1); }

      #toast-container { bottom: 16px; right: 16px; left: 16px; }
      .toast { max-width: 100%; white-space: normal; }
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <div id="lightbox">
    <button id="lightbox-close">×</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <div class="container">
    <header>
      <a href="/portal/" class="back-btn">← Portal</a>
      <div class="header-title">
        <div class="header-eyebrow">Lumora</div>
        <h1 id="galaxyName">Loading…</h1>
      </div>
    </header>

    <!-- Customization -->
    <div class="card">
      <div class="card-label" style="justify-content: space-between;">
        <span data-i18n="customization">Customization</span>
        <span id="saveIndicator" class="save-indicator"></span>
      </div>
      <div id="templateSection" style="margin-bottom: 16px; display: none;">
        <label style="display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 6px;" data-i18n="template-label">Template</label>
        <select id="templateSelect" style="width: 100%; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 13px;">
          <option value="galaxy">🌌 Galaxy (classic)</option>
          <option value="fall">🎞 Fall Through Memories</option>

        </select>
      </div>
      <div class="select-row">
        <div id="themeSection">
          <label style="display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 6px;" data-i18n="theme-label">Theme</label>
          <select id="themeSelect" style="width: 100%; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 13px;">
            <option value="">No theme</option>
          </select>
        </div>
        <div id="musicSection">
          <label style="display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 6px;" data-i18n="music-label">Background Music</label>
          <select id="musicSelect" style="width: 100%; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 13px;">
            <option value="">No music</option>
          </select>
        </div>
      </div>
      <div id="captionSection" style="margin-bottom: 16px;">
        <label style="display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 6px;" data-i18n="captions-label">Captions</label>
        <div id="captionList" style="margin-bottom: 8px;"></div>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="captionInput" placeholder="Add caption..." style="flex: 1; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 13px;">
          <button class="btn btn-secondary" id="addCaptionBtn">Add</button>
        </div>
      </div>
    </div>

    <!-- Upload & Actions -->
    <div class="card">
      <div class="card-label" style="justify-content: space-between;">
        <span data-i18n="upload-title">Upload Images</span>
        <div class="action-row" style="margin: 0;">
          <button class="btn btn-secondary" id="copyLinkBtn">🔗 Copy Link</button>
          <button class="btn btn-danger" id="deleteGalaxyBtn">🗑 Delete</button>
        </div>
      </div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🖼️</div>
        <div>
          <div class="upload-text">Drop images here or click to browse</div>
          <div class="upload-hint" id="uploadHint">Supports JPG, PNG, GIF, WebP</div>
        </div>
        <input type="file" id="fileInput" class="file-input" multiple accept="image/*">
      </div>
      <button class="btn btn-primary" id="uploadBtn">Upload Images</button>
      <div class="progress-wrap hidden" id="uploadProgress">
        <div class="progress-track">
          <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="progress-label" id="progressLabel">Uploading…</div>
      </div>
    </div>

    <!-- Images -->
    <div class="card">
      <div class="card-label" id="imagesLabel">Images</div>
      <div class="masonry-grid" id="imageGrid">
        <div class="grid-empty">
          <div class="spinner"></div>
          <div>Loading images…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/shared/js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelector('.back-btn').textContent = t.back;
      document.querySelector('[data-i18n="customization"]').textContent = t.customization;
      document.querySelector('[data-i18n="template-label"]').textContent = t.template;
      document.querySelector('[data-i18n="theme-label"]').textContent = t.theme;
      document.querySelector('#themeSelect option[value=""]').textContent = t.noTheme;
      document.querySelector('[data-i18n="music-label"]').textContent = t.music;
      document.querySelector('#musicSelect option[value=""]').textContent = t.noMusic;
      document.querySelector('[data-i18n="captions-label"]').textContent = t.captions;
      document.getElementById('captionInput').placeholder = t.captionPlaceholder;
      document.getElementById('addCaptionBtn').textContent = t.addCaption;
      document.querySelector('[data-i18n="upload-title"]').textContent = t.uploadImages;
      document.querySelector('.upload-text').textContent = t.dropHint;
      document.getElementById('uploadHint').textContent = t.uploadHint;
      document.getElementById('uploadBtn').textContent = t.uploadBtn;
      document.getElementById('copyLinkBtn').textContent = t.copyLink;
      document.getElementById('deleteGalaxyBtn').textContent = t.deleteGalaxy;
      document.getElementById('imagesLabel').textContent = t.images;
      document.getElementById('galaxyName').textContent = t.loading;
      document.querySelector('.grid-empty div:last-child').textContent = t.loading;
    });
  </script>
  <script src="js/galaxy.js"></script>
  <script src="js/galaxy-custom.js"></script>
</body>
</html>

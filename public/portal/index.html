<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal — Galaxy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a1f;
      font-family: sans-serif;
      color: #fff;
      padding: 32px 16px;
    }
    header {
      max-width: 800px;
      margin: 0 auto 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { color: #e0b3ff; font-size: 20px; }
    .logout {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 8px 16px;
      border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .logout:hover { background: rgba(255,255,255,0.15); }
    .container { max-width: 800px; margin: 0 auto; }
    .section-title {
      font-size: 14px; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
    }
    .galaxy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .galaxy-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 20px;
      text-decoration: none; color: inherit; display: block;
      transition: border-color 0.2s;
    }
    .galaxy-card:hover { border-color: #a259f7; }
    .galaxy-name { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .galaxy-id { font-size: 11px; color: rgba(255,255,255,0.3); word-break: break-all; }
    .galaxy-status {
      display: inline-block; padding: 2px 8px;
      border-radius: 99px; font-size: 11px; margin-top: 8px;
      background: rgba(107,255,184,0.15); color: #6bffb8;
    }
    .btn-new {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; background: #a259f7;
      border: none; border-radius: 8px;
      color: #fff; font-size: 14px; cursor: pointer; margin-bottom: 24px;
    }
    .btn-new:hover { background: #8b3de8; }
    .empty { color: rgba(255,255,255,0.4); font-size: 14px; padding: 24px 0; }
    .user-info { font-size: 13px; color: rgba(255,255,255,0.5); }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #12122a; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 24px; width: 320px;
    }
    .modal h3 { margin-bottom: 16px; color: #e0b3ff; }
    .modal input {
      width: 100%; padding: 10px 12px; margin-bottom: 12px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; color: #fff; font-size: 14px;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
    .modal-actions button {
      flex: 1; padding: 10px; border: none;
      border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: #fff; }
    .btn-create { background: #a259f7; color: #fff; }
    .msg { font-size: 13px; margin-top: 8px; min-height: 18px; color: #ff6b6b; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>✨ Galaxy Portal</h1>
      <div class="user-info" id="user-email"></div>
    </div>
    <button class="logout" id="btn-logout">Đăng xuất</button>
  </header>

  <div class="container">
    <div class="section-title">Galaxies của bạn</div>
    <button class="btn-new" id="btn-open-modal">+ Tạo galaxy mới</button>
    <div class="galaxy-grid" id="galaxy-grid"></div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Tạo Galaxy mới</h3>
      <input type="text" id="galaxy-name" placeholder="Tên galaxy (vd: moon, emiu...)" />
      <div class="msg" id="modal-msg"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Hủy</button>
        <button class="btn-create" id="btn-create">Tạo</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/auth/';

    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('user-email').textContent = user.email || '';

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth/';
    }

    function openModal() {
      document.getElementById('modal').classList.add('open');
      document.getElementById('galaxy-name').value = '';
      document.getElementById('modal-msg').textContent = '';
      document.getElementById('btn-create').disabled = false;
      document.getElementById('btn-create').textContent = 'Tạo';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    async function loadGalaxies() {
      const grid = document.getElementById('galaxy-grid');
      grid.textContent = '';
      try {
        const res = await fetch('/galaxies/my', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        renderGalaxies(grid, data.meta || []);
      } catch {
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'Lỗi tải dữ liệu';
        grid.appendChild(p);
      }
    }

    function renderGalaxies(grid, galaxies) {
      grid.textContent = '';
      if (!galaxies.length) {
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'Chưa có galaxy nào. Tạo ngay!';
        grid.appendChild(p);
        return;
      }
      galaxies.forEach(function(g) {
        const a = document.createElement('a');
        a.className = 'galaxy-card';
        a.href = '/galaxy-moon/?galaxyId=' + g._id;
        a.target = '_blank';

        const name = document.createElement('div');
        name.className = 'galaxy-name';
        name.textContent = g.name;

        const status = document.createElement('div');
        status.className = 'galaxy-status';
        status.textContent = g.status;

        const id = document.createElement('div');
        id.className = 'galaxy-id';
        id.textContent = g._id;

        a.appendChild(name);
        a.appendChild(status);
        a.appendChild(id);
        grid.appendChild(a);
      });
    }

    document.getElementById('btn-logout').addEventListener('click', logout);
    document.getElementById('btn-open-modal').addEventListener('click', openModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);

    document.getElementById('btn-create').addEventListener('click', async function() {
      const name = document.getElementById('galaxy-name').value.trim();
      const msg = document.getElementById('modal-msg');
      const btn = document.getElementById('btn-create');
      if (!name) { msg.textContent = 'Nhập tên galaxy'; return; }
      btn.disabled = true;
      btn.textContent = 'Đang tạo...';
      try {
        const res = await fetch('/galaxies', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ name: name })
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.message || 'Lỗi';
          btn.disabled = false;
          btn.textContent = 'Tạo';
          return;
        }
        closeModal();
        loadGalaxies();
      } catch {
        msg.textContent = 'Lỗi kết nối';
        btn.disabled = false;
        btn.textContent = 'Tạo';
      }
    });

    loadGalaxies();
  </script>
</body>
</html>

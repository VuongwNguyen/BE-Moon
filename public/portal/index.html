<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal — Galaxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060e;
      --surface: rgba(255,255,255,0.04);
      --surface-2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(139,92,246,0.35);
      --text: #ede9fe;
      --text-sub: rgba(255,255,255,0.42);
      --text-dim: rgba(255,255,255,0.22);
      --accent: #8b5cf6;
      --accent-dark: #7c3aed;
      --accent-light: #c4b5fd;
      --red: #f87171;
      --green: #6ee7b7;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 45% at 15% 0%, rgba(109,40,217,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 45% 55% at 85% 105%, rgba(79,25,175,0.13) 0%, transparent 70%);
      font-family: 'Jost', sans-serif;
      color: var(--text);
      padding: 40px 20px 80px;
    }

    .container { max-width: 920px; margin: 0 auto; }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 44px;
    }
    .header-brand h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(18px, 3.5vw, 24px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-star {
      color: var(--accent-light);
      opacity: 0.8;
      font-style: normal;
    }
    .user-info {
      font-size: 13px;
      color: var(--text-sub);
      letter-spacing: 0.02em;
    }
    .logout {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.03em;
      transition: all 0.2s;
    }
    .logout:hover {
      border-color: var(--border-accent);
      color: var(--text);
      background: var(--surface-2);
    }

    /* ── Tabs ────────────────────────────────────── */
    .tabs-nav {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      color: var(--text-sub);
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent-light); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Create button ───────────────────────────── */
    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all 0.2s;
    }
    .btn-new:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139,92,246,0.3);
    }

    /* ── Galaxy cards ────────────────────────────── */
    .galaxy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .galaxy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }
    .galaxy-card:hover {
      border-color: var(--border-accent);
      background: var(--surface-2);
      transform: translateY(-2px);
    }
    .galaxy-name {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .galaxy-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      background: rgba(110,231,183,0.1);
      color: var(--green);
      border: 1px solid rgba(110,231,183,0.22);
      margin-bottom: 8px;
      width: fit-content;
    }
    .galaxy-status::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .galaxy-id-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      min-width: 0;
    }
    .galaxy-id {
      font-size: 11px;
      color: var(--text-dim);
      font-family: monospace;
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .btn-copy-id {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 5px;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .btn-copy-id:hover {
      border-color: var(--border-accent);
      color: var(--accent-light);
    }
    .galaxy-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .btn-manage {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .btn-manage:hover { background: var(--accent-dark); }
    .btn-view {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      transition: all 0.15s;
    }
    .btn-view:hover { border-color: var(--border-accent); color: var(--accent-light); }

    /* ── Badges ──────────────────────────────────── */
    .admin-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      background: rgba(248,113,113,0.1);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.2);
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Empty / Admin placeholder ───────────────── */
    .empty {
      color: var(--text-sub);
      font-size: 14px;
      padding: 52px 24px;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .admin-coming {
      text-align: center;
      padding: 60px 0;
      color: var(--text-sub);
    }
    .admin-coming .icon { font-size: 36px; margin-bottom: 14px; opacity: 0.35; }
    .admin-coming p { font-size: 14px; }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #0d0d1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 28px;
      width: 340px;
    }
    .modal h3 {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-light);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Jost', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal input:focus { border-color: var(--border-accent); }
    .modal input::placeholder { color: var(--text-sub); }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-cancel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-sub);
    }
    .btn-cancel:hover { color: var(--text); }
    .btn-create {
      background: var(--accent);
      border: none;
      color: #fff;
    }
    .btn-create:hover { background: var(--accent-dark); }
    .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
      color: var(--red);
      letter-spacing: 0.02em;
    }

    /* ── Subscription ────────────────────────────── */
    .sub-section { max-width: 520px; }
    .sub-current {
      background: var(--surface);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .sub-current .plan-label {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-light);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .sub-current .plan-expiry { font-size: 13px; color: var(--text-sub); }
    .sub-plans {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }
    .plan-card:hover { border-color: var(--border-accent); }
    .plan-card .plan-name {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-light);
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .plan-card .plan-features {
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 14px;
      line-height: 1.7;
    }
    .plan-card .plan-price { font-size: 13px; color: var(--text); margin-bottom: 14px; }
    .plan-card .plan-price strong { font-size: 17px; }
    .period-toggle { display: flex; gap: 6px; margin-bottom: 20px; }
    .period-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-sub);
      font-size: 12px;
      font-family: 'Jost', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-subscribe {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-subscribe:hover { background: var(--accent-dark); }
    .btn-subscribe:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      border: 1px solid var(--border-accent);
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      color: var(--text);
      z-index: 200;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(110,231,183,0.4); color: var(--green); }
    .toast.error { border-color: rgba(248,113,113,0.4); color: var(--red); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-brand">
        <h1><i class="brand-star">✦</i> Galaxy Portal</h1>
        <div class="user-info" id="user-email"></div>
      </div>
      <button class="logout" id="btn-logout">Đăng xuất</button>
    </header>

    <div class="tabs-nav" id="tabs-nav">
      <button class="tab-btn active" data-tab="galaxies">Galaxies</button>
      <button class="tab-btn" data-tab="admin" id="tab-admin" style="display:none">
        🛡 Admin <span class="admin-badge">ADMIN</span>
      </button>
      <button class="tab-btn" data-tab="subscription">Subscription</button>
    </div>

    <div class="tab-panel active" id="panel-galaxies">
      <button class="btn-new" id="btn-open-modal">+ Tạo galaxy mới</button>
      <div class="galaxy-grid" id="galaxy-grid"></div>
    </div>

    <div class="tab-panel" id="panel-admin">
      <div class="admin-coming">
        <div class="icon">🚀</div>
        <p>Quản lý users, subscription và doanh thu sẽ sớm có ở đây.</p>
      </div>
    </div>

    <div class="tab-panel" id="panel-subscription">
      <div class="sub-section" id="sub-section">
        <div class="empty" id="sub-loading">Dang tai...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Tạo Galaxy mới</h3>
      <input type="text" id="galaxy-name" placeholder="Tên galaxy (vd: moon, emiu…)" />
      <div class="msg" id="modal-msg"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Hủy</button>
        <button class="btn-create" id="btn-create">Tạo</button>
      </div>
    </div>
  </div>

  <script src="./js/main.js"></script>
  <script src="./js/subscription.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Galaxy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #0a0a1f;
      display: flex; align-items: center; justify-content: center;
      font-family: sans-serif; color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 32px; width: 360px;
    }
    h2 { text-align: center; margin-bottom: 24px; color: #e0b3ff; }
    .tabs { display: flex; margin-bottom: 24px; gap: 8px; }
    .tab {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      cursor: pointer; background: rgba(255,255,255,0.08); color: #fff;
    }
    .tab.active { background: #a259f7; }
    input {
      width: 100%; padding: 10px 12px; margin-bottom: 12px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; color: #fff; font-size: 14px;
    }
    input.otp-input {
      font-size: 28px; font-weight: bold; letter-spacing: 12px; text-align: center;
    }
    .btn-primary {
      width: 100%; padding: 12px; background: #a259f7;
      border: none; border-radius: 6px; color: #fff;
      font-size: 15px; cursor: pointer; margin-top: 4px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { background: #8b3de8; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      width: 100%; padding: 10px; margin-top: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;
    }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { text-align: center; margin-top: 12px; font-size: 13px; min-height: 20px; }
    .msg.error { color: #ff6b6b; }
    .msg.success { color: #6bffb8; }
    .otp-hint { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 16px; text-align: center; }
    .screen { display: none; }
    .screen.active { display: block; }
    .back-btn {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 13px; cursor: pointer; margin-bottom: 16px; padding: 0;
    }
    .back-btn:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h2>✨ Galaxy</h2>

    <!-- Screen 1: Login / Register -->
    <div class="screen active" id="screen-auth">
      <div class="tabs">
        <button class="tab active" id="tab-login">Đăng nhập</button>
        <button class="tab" id="tab-register">Đăng ký</button>
      </div>
      <form id="form-auth">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" class="btn-primary" id="submit-btn">Đăng nhập</button>
      </form>
      <div class="msg" id="msg-auth"></div>
    </div>

    <!-- Screen 2: OTP Verification -->
    <div class="screen" id="screen-otp">
      <button class="back-btn" id="back-btn">← Quay lại</button>
      <p class="otp-hint">Nhập mã OTP 6 số đã gửi tới<br><strong id="otp-email-display"></strong></p>
      <form id="form-otp">
        <input type="text" class="otp-input" id="otp" placeholder="______"
          maxlength="6" inputmode="numeric" autocomplete="one-time-code" required />
        <button type="submit" class="btn-primary" id="verify-btn">Xác thực</button>
      </form>
      <button class="btn-secondary" id="btn-resend">Gửi lại OTP</button>
      <div class="msg" id="msg-otp"></div>
    </div>
  </div>

  <script>
    var mode = 'login';
    var pendingEmail = '';
    var resendTimer = null;

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    function setMsg(id, text, type) {
      var el = document.getElementById(id);
      el.className = 'msg' + (type ? ' ' + type : '');
      el.textContent = text;
    }

    function setLoading(btnId, loading, label) {
      var btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = '';
      if (loading) {
        var spinner = document.createElement('span');
        spinner.className = 'spinner';
        btn.appendChild(spinner);
      }
      var text = document.createTextNode(loading ? (label || 'Đang xử lý...') : label);
      btn.appendChild(text);
    }

    function startResendCountdown(seconds) {
      var btn = document.getElementById('btn-resend');
      btn.disabled = true;
      var remaining = seconds;
      btn.textContent = 'Gửi lại sau ' + remaining + 's';
      resendTimer = setInterval(function() {
        remaining--;
        if (remaining <= 0) {
          clearInterval(resendTimer);
          btn.disabled = false;
          btn.textContent = 'Gửi lại OTP';
        } else {
          btn.textContent = 'Gửi lại sau ' + remaining + 's';
        }
      }, 1000);
    }

    function showOtpScreen(email, countdown) {
      pendingEmail = email;
      document.getElementById('otp-email-display').textContent = email;
      document.getElementById('otp').value = '';
      setMsg('msg-otp', '', '');
      setLoading('verify-btn', false, 'Xác thực');
      showScreen('otp');
      if (resendTimer) clearInterval(resendTimer);
      startResendCountdown(countdown || 60);
    }

    // Tab switching
    document.getElementById('tab-login').addEventListener('click', function() {
      mode = 'login';
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-register').classList.remove('active');
      setLoading('submit-btn', false, 'Đăng nhập');
      setMsg('msg-auth', '', '');
    });

    document.getElementById('tab-register').addEventListener('click', function() {
      mode = 'register';
      document.getElementById('tab-register').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
      setLoading('submit-btn', false, 'Đăng ký');
      setMsg('msg-auth', '', '');
    });

    document.getElementById('back-btn').addEventListener('click', function() {
      showScreen('auth');
    });

    // Form auth submit
    document.getElementById('form-auth').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var label = mode === 'login' ? 'Đăng nhập' : 'Đăng ký';
      setMsg('msg-auth', '', '');
      setLoading('submit-btn', true, 'Đang xử lý...');

      try {
        var res = await fetch('/auth/' + mode, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        });
        var data = await res.json();

        if (res.status === 403 && data.message && data.message.includes('not verified')) {
          showOtpScreen(email);
          return;
        }
        if (!res.ok) {
          setMsg('msg-auth', data.message || 'Có lỗi xảy ra', 'error');
          setLoading('submit-btn', false, label);
          return;
        }
        if (mode === 'register') {
          showOtpScreen(email);
          return;
        }
        localStorage.setItem('token', data.meta.token);
        localStorage.setItem('user', JSON.stringify(data.meta.user));
        setMsg('msg-auth', 'Thành công! Đang chuyển hướng...', 'success');
        setTimeout(function() { window.location.href = '/portal/'; }, 800);
      } catch(err) {
        setMsg('msg-auth', 'Lỗi kết nối server', 'error');
        setLoading('submit-btn', false, label);
      }
    });

    // OTP verify submit
    document.getElementById('form-otp').addEventListener('submit', async function(e) {
      e.preventDefault();
      var otp = document.getElementById('otp').value;
      setMsg('msg-otp', '', '');
      setLoading('verify-btn', true, 'Đang xác thực...');

      try {
        var res = await fetch('/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail, otp: otp }),
        });
        var data = await res.json();
        if (!res.ok) {
          setMsg('msg-otp', data.message || 'OTP không hợp lệ', 'error');
          setLoading('verify-btn', false, 'Xác thực');
          return;
        }
        localStorage.setItem('token', data.meta.token);
        localStorage.setItem('user', JSON.stringify(data.meta.user));
        setMsg('msg-otp', 'Xác thực thành công! Đang chuyển hướng...', 'success');
        setTimeout(function() { window.location.href = '/portal/'; }, 800);
      } catch(err) {
        setMsg('msg-otp', 'Lỗi kết nối server', 'error');
        setLoading('verify-btn', false, 'Xác thực');
      }
    });

    // Resend OTP
    document.getElementById('btn-resend').addEventListener('click', async function() {
      setMsg('msg-otp', '', '');
      try {
        var res = await fetch('/auth/resend-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: pendingEmail }),
        });
        var data = await res.json();
        if (!res.ok) {
          setMsg('msg-otp', data.message || 'Lỗi gửi OTP', 'error');
          return;
        }
        setMsg('msg-otp', 'OTP đã được gửi lại!', 'success');
        startResendCountdown(60);
      } catch(err) {
        setMsg('msg-otp', 'Lỗi kết nối server', 'error');
      }
    });
  </script>
</body>
</html>

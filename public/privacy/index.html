<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Chính sách bảo mật — Lumora</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #06060e; --accent: #8b5cf6; --text: #e2e8f0; --text-sub: rgba(255,255,255,0.6); --border: rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; line-height: 1.7; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 20px; color: var(--accent); }
    .nav-logo a { color: inherit; text-decoration: none; }
    .container { max-width: 800px; margin: 60px auto; padding: 0 40px; }
    h1 { font-size: 42px; margin-bottom: 12px; }
    .date { color: var(--text-sub); font-size: 14px; margin-bottom: 40px; }
    h2 { font-size: 24px; margin-top: 40px; margin-bottom: 16px; color: var(--accent); }
    p { margin-bottom: 16px; color: var(--text-sub); }
    ul { margin-left: 24px; margin-bottom: 16px; }
    li { margin-bottom: 8px; color: var(--text-sub); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><a href="/">✦ Lumora</a></div>
  </nav>

  <div class="container">
    <h1 data-vi="Chính sách bảo mật" data-en="Privacy Policy"></h1>
    <div class="date" data-vi="Cập nhật lần cuối: 25/04/2026" data-en="Last updated: 25/04/2026"></div>

    <p data-vi="Lumora cam kết bảo vệ quyền riêng tư của bạn. Chính sách này giải thích cách chúng tôi thu thập, sử dụng và bảo vệ thông tin cá nhân của bạn."
       data-en="Lumora is committed to protecting your privacy. This policy explains how we collect, use, and protect your personal information."></p>

    <h2 data-vi="1. Thông tin chúng tôi thu thập" data-en="1. Information We Collect"></h2>
    <p><strong data-vi="Thông tin bạn cung cấp:" data-en="Information you provide:"></strong></p>
    <ul>
      <li data-vi="Email và mật khẩu khi đăng ký" data-en="Email and password when registering"></li>
      <li data-vi="Tên hiển thị và thông tin hồ sơ" data-en="Display name and profile information"></li>
      <li data-vi="Ảnh, âm nhạc và nội dung bạn tải lên" data-en="Photos, music, and content you upload"></li>
      <li data-vi="Thông tin thanh toán (được xử lý qua bên thứ ba)" data-en="Payment information (processed by third parties)"></li>
    </ul>
    <p><strong data-vi="Thông tin tự động thu thập:" data-en="Automatically collected information:"></strong></p>
    <ul>
      <li data-vi="Địa chỉ IP và thông tin thiết bị" data-en="IP address and device information"></li>
      <li data-vi="Dữ liệu sử dụng (tính năng bạn dùng, thời gian truy cập)" data-en="Usage data (features used, access times)"></li>
      <li data-vi="Cookies và công nghệ theo dõi tương tự" data-en="Cookies and similar tracking technologies"></li>
    </ul>

    <h2 data-vi="2. Cách chúng tôi sử dụng thông tin" data-en="2. How We Use Information"></h2>
    <p data-vi="Chúng tôi sử dụng thông tin của bạn để:" data-en="We use your information to:"></p>
    <ul>
      <li data-vi="Cung cấp và vận hành dịch vụ Lumora" data-en="Provide and operate the Lumora service"></li>
      <li data-vi="Xử lý thanh toán và quản lý đăng ký" data-en="Process payments and manage subscriptions"></li>
      <li data-vi="Gửi thông báo về tài khoản và cập nhật dịch vụ" data-en="Send account notifications and service updates"></li>
      <li data-vi="Cải thiện trải nghiệm người dùng" data-en="Improve user experience"></li>
      <li data-vi="Phát hiện và ngăn chặn gian lận, lạm dụng" data-en="Detect and prevent fraud and abuse"></li>
      <li data-vi="Tuân thủ nghĩa vụ pháp lý" data-en="Comply with legal obligations"></li>
    </ul>

    <h2 data-vi="3. Chia sẻ thông tin" data-en="3. Information Sharing"></h2>
    <p data-vi="Chúng tôi không bán thông tin cá nhân của bạn. Chúng tôi chỉ chia sẻ khi:"
       data-en="We do not sell your personal information. We only share when:"></p>
    <ul>
      <li><strong data-vi="Với sự đồng ý của bạn:" data-en="With your consent:"></strong> <span data-vi="Khi bạn chia sẻ Lumora công khai" data-en="When you share your Lumora publicly"></span></li>
      <li><strong data-vi="Nhà cung cấp dịch vụ:" data-en="Service providers:"></strong> <span data-vi="Hosting, thanh toán, phân tích (họ phải tuân thủ bảo mật)" data-en="Hosting, payments, analytics (they must comply with security requirements)"></span></li>
      <li><strong data-vi="Yêu cầu pháp lý:" data-en="Legal requirements:"></strong> <span data-vi="Khi luật pháp yêu cầu hoặc để bảo vệ quyền lợi hợp pháp" data-en="When required by law or to protect legal rights"></span></li>
      <li><strong data-vi="Chuyển giao kinh doanh:" data-en="Business transfer:"></strong> <span data-vi="Trong trường hợp sáp nhập hoặc mua lại" data-en="In the event of a merger or acquisition"></span></li>
    </ul>

    <h2 data-vi="4. Lưu trữ và bảo mật" data-en="4. Storage and Security"></h2>
    <p data-vi="Chúng tôi lưu trữ dữ liệu của bạn trên các máy chủ an toàn và áp dụng các biện pháp bảo mật:"
       data-en="We store your data on secure servers and apply security measures:"></p>
    <ul>
      <li data-vi="Mã hóa dữ liệu khi truyền tải (HTTPS/TLS)" data-en="Data encryption in transit (HTTPS/TLS)"></li>
      <li data-vi="Mã hóa mật khẩu (bcrypt)" data-en="Password hashing (bcrypt)"></li>
      <li data-vi="Kiểm soát truy cập nghiêm ngặt" data-en="Strict access controls"></li>
      <li data-vi="Sao lưu định kỳ" data-en="Regular backups"></li>
    </ul>
    <p data-vi="Tuy nhiên, không có hệ thống nào an toàn tuyệt đối. Chúng tôi khuyến khích bạn sử dụng mật khẩu mạnh và không chia sẻ thông tin đăng nhập."
       data-en="However, no system is completely secure. We encourage you to use strong passwords and not share your login credentials."></p>

    <h2 data-vi="5. Thời gian lưu trữ" data-en="5. Retention Period"></h2>
    <p data-vi="Chúng tôi lưu trữ thông tin của bạn:" data-en="We retain your information:"></p>
    <ul>
      <li data-vi="Trong suốt thời gian tài khoản còn hoạt động" data-en="For as long as your account is active"></li>
      <li data-vi="Sau khi xóa tài khoản: 30 ngày (để khôi phục nếu cần)" data-en="After account deletion: 30 days (for recovery if needed)"></li>
      <li data-vi="Một số dữ liệu có thể được lưu lâu hơn để tuân thủ pháp luật" data-en="Some data may be retained longer to comply with legal obligations"></li>
    </ul>

    <h2 data-vi="6. Quyền của bạn" data-en="6. Your Rights"></h2>
    <p data-vi="Bạn có quyền:" data-en="You have the right to:"></p>
    <ul>
      <li><strong data-vi="Truy cập:" data-en="Access:"></strong> <span data-vi="Xem thông tin cá nhân chúng tôi có về bạn" data-en="View the personal information we hold about you"></span></li>
      <li><strong data-vi="Sửa đổi:" data-en="Rectification:"></strong> <span data-vi="Cập nhật thông tin không chính xác" data-en="Update inaccurate information"></span></li>
      <li><strong data-vi="Xóa:" data-en="Deletion:"></strong> <span data-vi="Yêu cầu xóa tài khoản và dữ liệu" data-en="Request deletion of your account and data"></span></li>
      <li><strong data-vi="Xuất dữ liệu:" data-en="Data portability:"></strong> <span data-vi="Tải về bản sao dữ liệu của bạn" data-en="Download a copy of your data"></span></li>
      <li><strong data-vi="Từ chối marketing:" data-en="Opt-out:"></strong> <span data-vi="Hủy đăng ký email quảng cáo" data-en="Unsubscribe from marketing emails"></span></li>
    </ul>
    <p data-vi="Để thực hiện các quyền này, vui lòng liên hệ qua form liên hệ trên website."
       data-en="To exercise these rights, please contact us via the contact form on the website."></p>

    <h2 data-vi="7. Cookies" data-en="7. Cookies"></h2>
    <p data-vi="Chúng tôi sử dụng cookies để:" data-en="We use cookies to:"></p>
    <ul>
      <li data-vi="Duy trì phiên đăng nhập" data-en="Maintain login sessions"></li>
      <li data-vi="Ghi nhớ tùy chọn của bạn" data-en="Remember your preferences"></li>
      <li data-vi="Phân tích cách sử dụng dịch vụ" data-en="Analyze how the service is used"></li>
    </ul>
    <p data-vi="Bạn có thể tắt cookies trong trình duyệt, nhưng một số tính năng có thể không hoạt động."
       data-en="You can disable cookies in your browser, but some features may not work."></p>

    <h2 data-vi="8. Trẻ em" data-en="8. Children"></h2>
    <p data-vi="Lumora không dành cho trẻ dưới 13 tuổi. Chúng tôi không cố ý thu thập thông tin từ trẻ em. Nếu bạn phát hiện trẻ em sử dụng dịch vụ, vui lòng thông báo để chúng tôi xử lý."
       data-en="Lumora is not intended for children under 13. We do not knowingly collect information from children. If you discover a child using the service, please notify us."></p>

    <h2 data-vi="9. Chuyển dữ liệu quốc tế" data-en="9. International Data Transfers"></h2>
    <p data-vi="Dữ liệu của bạn có thể được xử lý ở các quốc gia khác nơi máy chủ của chúng tôi đặt. Chúng tôi đảm bảo mức độ bảo vệ tương đương bất kể vị trí."
       data-en="Your data may be processed in other countries where our servers are located. We ensure equivalent protection regardless of location."></p>

    <h2 data-vi="10. Thay đổi chính sách" data-en="10. Policy Changes"></h2>
    <p data-vi="Chúng tôi có thể cập nhật chính sách này. Thay đổi quan trọng sẽ được thông báo qua email hoặc thông báo trên trang web trước ít nhất 7 ngày."
       data-en="We may update this policy. Important changes will be notified via email or on the website at least 7 days in advance."></p>

    <h2 data-vi="11. Liên hệ" data-en="11. Contact"></h2>
    <p data-vi="Nếu bạn có câu hỏi về chính sách bảo mật, liên hệ qua form liên hệ trên website."
       data-en="If you have questions about this privacy policy, contact us via the contact form on the website."></p>
  </div>

  <script src="/shared/js/i18n.js"></script>
  <script>
    const lang = localStorage.getItem('lang') || ((navigator.language || '').startsWith('en') && !navigator.languages?.some(l => l.startsWith('vi')) ? 'en' : 'vi');
    document.querySelectorAll('[data-vi]').forEach(el => {
      el.textContent = lang === 'en' ? el.dataset.en : el.dataset.vi;
    });
    if (lang === 'en') {
      document.title = 'Privacy Policy — Lumora';
      document.documentElement.lang = 'en';
    }
  </script>
</body>
</html>
